apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: customer-success-fte
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: message-processor
          image: customer-success-fte-api:latest
          command: ["python", "-m", "production.workers.message_processor"]
          envFrom:
            - configMapRef:
                name: fte-config
            - secretRef:
                name: fte-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
