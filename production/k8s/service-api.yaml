apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: customer-success-fte
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: api-external
  namespace: customer-success-fte
spec:
  selector:
    app: api
  ports:
    - name: api
      port: 8000
      targetPort: 8000
  type: LoadBalancer
